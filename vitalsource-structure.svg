<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Pretendard','Inter',sans-serif">
  <defs>
    <linearGradient id="vs1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FF6B00"/><stop offset="100%" stop-color="#FF9500"/></linearGradient>
    <linearGradient id="vs2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1B4D8E"/><stop offset="100%" stop-color="#2D6BC4"/></linearGradient>
    <linearGradient id="vs3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00B894"/><stop offset="100%" stop-color="#00D9A7"/></linearGradient>
    <linearGradient id="vs4" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#9B59B6"/><stop offset="100%" stop-color="#8E44AD"/></linearGradient>
    <linearGradient id="vs5" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E74C3C"/><stop offset="100%" stop-color="#C0392B"/></linearGradient>
    <linearGradient id="vs6" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3498DB"/><stop offset="100%" stop-color="#2980B9"/></linearGradient>
