  <text x="250" y="676" text-anchor="middle" font-size="10" fill="#4A5568">학습 행동 분석</text>
  <rect x="420" y="657" width="100" height="30" rx="0" fill="#F8F9FA" stroke="#eee" stroke-width="1"/>
