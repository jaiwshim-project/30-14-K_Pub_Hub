<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPIN Selling - 개념 퀴즈</title>
<link rel="stylesheet" href="common.css">
<style>
.quiz-cat-card {
  background: linear-gradient(135deg, #ffffff, var(--pastel-blue));
  border: 1.5px solid rgba(36,113,163,0.12);
  border-radius: 12px;
  padding: 14px 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.quiz-cat-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(36,113,163,0.12);
  border-color: var(--blue);
}

.quiz-cat-card.gold {
  background: linear-gradient(135deg, #ffffff, var(--pastel-gold));
  border-color: rgba(212,136,15,0.15);
}

.quiz-cat-card.gold:hover {
  border-color: var(--gold);
  box-shadow: 0 6px 20px rgba(212,136,15,0.12);
}

.quiz-cat-card.completed {
  border-color: var(--green);
  background: linear-gradient(135deg, #ffffff, var(--pastel-green));
}

.quiz-cat-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 2px;
}

.quiz-cat-count {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.quiz-cat-score {
  font-size: 16px;
  font-weight: 900;
  color: var(--text-disabled);
  padding: 6px 0;
  border-top: 1px solid var(--border-light);
}

.quiz-cat-card.completed .quiz-cat-score {
  color: var(--green);
}

.quiz-cat-card.completed .quiz-cat-name::after {
  content: ' \2713';
  color: var(--green);
  font-weight: 900;
}

@media (max-width: 768px) {
  #quizCategoryGrid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 480px) {
  #quizCategoryGrid { grid-template-columns: repeat(2, 1fr); }
}

.quiz-timer {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: rgba(212,136,15,0.08);
  border: 1px solid rgba(212,136,15,0.2);
  border-radius: 10px;
  font-size: 16px;
  font-weight: 800;
  color: var(--gold);
  font-family: 'Inter', monospace;
}
.quiz-timer.warning { color: var(--accent); background: rgba(192,57,43,0.08); border-color: rgba(192,57,43,0.2); }
</style>
</head>
<body>

<!-- AUTH (hidden, kept for future use) -->
<div class="auth-overlay hidden" id="authLogin"></div>
<div class="auth-overlay hidden" id="authSignup"></div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none;">

<div class="header">
  <div class="logo">
    <a href="index.html" style="display:flex;align-items:center;gap:14px;text-decoration:none;">
      <img src="logo-kornferry.png" alt="Korn Ferry" class="logo-img">
      <div>
        <div class="logo-text">SPIN Selling <span style="color:var(--gold-light);">AI</span></div>
        <div class="logo-sub">AI-Powered Training</div>
      </div>
    </a>
  </div>
  <div class="header-right">
    <div class="team-badge" id="headerTeam"></div>
    <div class="score-display" id="headerScore">0 점</div>
  </div>
</div>

<div id="navPlaceholder" data-active="quiz"></div>

<div class="main">
<div class="section">
  <div class="card">
    <div class="card-title"><span class="icon">📝</span> SPIN 개념 퀴즈</div>
    <p style="color: var(--text-muted); margin-bottom: 16px; font-size: 13px;">각 문제를 읽고 정답을 선택하세요. 정답 시 팀 점수에 반영됩니다.</p>

    <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px;" id="quizCategoryGrid">
      <div class="quiz-cat-card" data-cat="concept" onclick="startQuiz('concept')">
        <div class="quiz-cat-name">핵심 개념</div>
        <div class="quiz-cat-count">8문제</div>
        <div class="quiz-cat-score" id="score-concept">0 / 80</div>
      </div>
      <div class="quiz-cat-card" data-cat="buyingCycle" onclick="startQuiz('buyingCycle')">
        <div class="quiz-cat-name">구매사이클</div>
        <div class="quiz-cat-count">5문제</div>
        <div class="quiz-cat-score" id="score-buyingCycle">0 / 50</div>
      </div>
      <div class="quiz-cat-card" data-cat="spinType" onclick="startQuiz('spinType')">
        <div class="quiz-cat-name">SPIN 질문 유형</div>
        <div class="quiz-cat-count">8문제</div>
        <div class="quiz-cat-score" id="score-spinType">0 / 80</div>
      </div>
      <div class="quiz-cat-card" data-cat="advanced" onclick="startQuiz('advanced')">
        <div class="quiz-cat-name">고급 문제</div>
        <div class="quiz-cat-count">6문제</div>
        <div class="quiz-cat-score" id="score-advanced">0 / 60</div>
      </div>
      <div class="quiz-cat-card gold" data-cat="all" onclick="startQuiz('all')">
        <div class="quiz-cat-name">전체 랜덤</div>
        <div class="quiz-cat-count">15문제</div>
        <div class="quiz-cat-score" id="score-all">0 / 150</div>
      </div>
    </div>

    <div id="quizArea" style="display:none;">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
        <div class="quiz-progress" style="flex:1;">
          <div class="quiz-bar"><div class="quiz-bar-fill" id="quizBarFill" style="width:0%"></div></div>
          <div class="quiz-count" id="quizCount">1 / 10</div>
        </div>
        <div class="quiz-timer" id="quizTimerBox" style="display:none;">
          ⏱ <span id="quizTimerDisplay">0:30</span>
        </div>
      </div>
      <div class="quiz-category" id="quizCategory"></div>
      <div class="quiz-question" id="quizQuestion"></div>
      <div class="quiz-options" id="quizOptions"></div>
      <div class="quiz-explain" id="quizExplain"></div>
      <div style="margin-top: 16px; text-align: right;">
        <button class="btn btn-primary" id="quizNextBtn" onclick="nextQuiz()" style="display:none;">다음 문제</button>
      </div>
    </div>
  </div>
</div>
</div>

<!-- Quiz Result Modal -->
<div class="modal-overlay" id="quizResultModal">
  <div class="modal">
    <h2>퀴즈 완료!</h2>
    <div class="big-score" id="quizFinalScore">0</div>
    <p style="color: var(--text-muted); margin-bottom: 16px;" id="quizFinalMsg"></p>
    <button class="btn btn-primary" onclick="closeModal('quizResultModal')">확인</button>
  </div>
</div>

<div id="flowNavPlaceholder"></div>
<div id="footerPlaceholder"></div>
</div>

<script src="common.js"></script>
<script src="quiz.js"></script>
</body>
</html>
