<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPIN Selling - 스핀 도구들</title>
<link rel="stylesheet" href="common.css">
<style>
.tool-card {
  background: linear-gradient(135deg, #ffffff, var(--pastel-blue));
  border: 1.5px solid rgba(36,113,163,0.12);
  border-radius: 14px;
  padding: 24px;
  margin-bottom: 20px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.tool-card:hover {
  box-shadow: 0 8px 28px rgba(26,58,107,0.12);
  transform: translateY(-2px);
}

.tool-card h3 {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.tool-card img {
  width: 100%;
  border-radius: 10px;
  border: 1px solid var(--border);
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  cursor: pointer;
  transition: transform 0.3s;
}

.tool-card img:hover {
  transform: scale(1.02);
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
}

/* Lightbox */
.lightbox {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  z-index: 9999;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

.lightbox.active { display: flex; }

.lightbox img {
  max-width: 90%;
  max-height: 90vh;
  border-radius: 12px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
}
</style>
</head>
<body>

<div class="auth-overlay hidden" id="authLogin"></div>
<div class="auth-overlay hidden" id="authSignup"></div>

<div id="mainApp" style="display:none;">

<div class="header">
  <div class="logo">
    <a href="index.html" onclick="clearSessionId();clearUser();clearRole();" style="display:flex;align-items:center;gap:14px;text-decoration:none;">
      <img src="logo-kornferry.png" alt="Korn Ferry" class="logo-img">
      <div>
        <div class="logo-text">SPIN Selling <span style="color:var(--gold-light);">AI</span></div>
        <div class="logo-sub">AI-Powered Training</div>
      </div>
    </a>
  </div>
  <div class="header-right">
    <div class="team-badge" id="headerTeam"></div>
    <div class="score-display" id="headerScore">0 점</div>
  </div>
</div>

<div id="navPlaceholder" data-active="spin-tools"></div>

<div class="main">
<div class="section">
  <div class="card">
    <div class="card-title"><span class="icon">🛠</span> 10. 스핀 도구들</div>
    <p style="color: var(--text-tertiary); margin-bottom: 24px; font-size: 14px; line-height: 1.6;">
      SPIN Selling 실전에서 활용하는 핵심 도구들입니다. 이미지를 클릭하면 크게 볼 수 있습니다.
    </p>

    <!-- 강사/관리자 전용 도구 -->
    <div id="trainerTools" style="display:none; margin-bottom:20px;">
      <div style="font-size:13px; font-weight:700; color:var(--text); margin-bottom:10px; text-transform:uppercase; letter-spacing:0.5px;">강사/관리자 도구</div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <a href="scoreboard.html" style="flex:1; min-width:200px; padding:20px; background:linear-gradient(135deg, #ffffff, var(--pastel-gold)); border:2px solid rgba(212,136,15,0.15); border-radius:12px; text-decoration:none; display:flex; align-items:center; gap:12px; transition:all 0.2s;" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 4px 16px rgba(212,136,15,0.15)'" onmouseout="this.style.transform='';this.style.boxShadow=''">
          <span style="font-size:28px;">🏆</span>
          <div>
            <div style="font-size:15px; font-weight:700; color:var(--text);">스코어보드</div>
            <div style="font-size:12px; color:var(--text-muted);">팀별/개인별 점수 현황 및 순위</div>
          </div>
        </a>
        <a href="coaching.html" style="flex:1; min-width:200px; padding:20px; background:linear-gradient(135deg, #ffffff, var(--pastel-purple)); border:2px solid rgba(125,60,152,0.15); border-radius:12px; text-decoration:none; display:flex; align-items:center; gap:12px; transition:all 0.2s;" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 4px 16px rgba(125,60,152,0.15)'" onmouseout="this.style.transform='';this.style.boxShadow=''">
          <span style="font-size:28px;">📊</span>
          <div>
            <div style="font-size:15px; font-weight:700; color:var(--text);">코칭 리포트</div>
            <div style="font-size:12px; color:var(--text-muted);">SPIN 활용 분석 및 코칭 피드백</div>
          </div>
        </a>
        <a href="report.html" style="flex:1; min-width:200px; padding:20px; background:linear-gradient(135deg, #ffffff, var(--pastel-green)); border:2px solid rgba(30,132,73,0.15); border-radius:12px; text-decoration:none; display:flex; align-items:center; gap:12px; transition:all 0.2s;" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 4px 16px rgba(30,132,73,0.15)'" onmouseout="this.style.transform='';this.style.boxShadow=''">
          <span style="font-size:28px;">📋</span>
          <div>
            <div style="font-size:15px; font-weight:700; color:var(--text);">교육참가 리포트</div>
            <div style="font-size:12px; color:var(--text-muted);">교육생별 AI 분석 리포트 생성 및 발송</div>
          </div>
        </a>
        <a href="admin.html" style="flex:1; min-width:200px; padding:20px; background:linear-gradient(135deg, #ffffff, var(--pastel-red)); border:2px solid rgba(192,57,43,0.15); border-radius:12px; text-decoration:none; display:flex; align-items:center; gap:12px; transition:all 0.2s;" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 4px 16px rgba(192,57,43,0.15)'" onmouseout="this.style.transform='';this.style.boxShadow=''">
          <span style="font-size:28px;">🔧</span>
          <div>
            <div style="font-size:15px; font-weight:700; color:var(--text);">관리자 대시보드</div>
            <div style="font-size:12px; color:var(--text-muted);">교육 세션 관리 및 전체 현황</div>
          </div>
        </a>
      </div>
      <hr style="border:none; border-top:1px dashed var(--border); margin:20px 0;">
    </div>

    <div class="tool-card">
      <h3><span style="color:var(--accent);">1</span> SPIN 사례 분석 도구</h3>
      <img src="tool-spin-case.jpg" alt="SPIN 사례 분석 도구" onclick="openLightbox(this.src)">
    </div>

    <div class="tool-card">
      <h3><span style="color:var(--blue);">2</span> 콜 플랜 도구 (1)</h3>
      <img src="tool-callplan1.jpg" alt="콜 플랜 도구 1" style="width:80%;" onclick="openLightbox(this.src)">
    </div>

    <div class="tool-card">
      <h3><span style="color:var(--green);">3</span> 콜 플랜 도구 (2)</h3>
      <img src="tool-callplan2.jpg" alt="콜 플랜 도구 2" style="width:80%;" onclick="openLightbox(this.src)">
    </div>
  </div>
</div>
</div>

<div id="footerPlaceholder"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="확대 보기">
</div>

<script src="common.js"></script>
<script>
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('active');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});

// 강사/관리자일 때 도구 표시
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(() => {
    const role = getSavedRole();
    if (role === 'trainer' || role === 'admin') {
      const el = document.getElementById('trainerTools');
      if (el) el.style.display = 'block';
    }
  }, 200);
});
</script>
</body>
</html>
