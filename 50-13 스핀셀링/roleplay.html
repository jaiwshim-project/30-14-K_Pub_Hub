<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPIN Selling - AI 롤플레이</title>
<link rel="stylesheet" href="common.css">
<style>
.step-label {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.step-num {
  background: var(--blue);
  color: white;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 800;
  flex: none;
}

.step-text {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-secondary);
}

.diff-btn {
  padding: 10px 20px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: var(--bg);
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}

.diff-btn:hover { transform: translateY(-2px); }
.diff-btn.easy { border-color: var(--green); color: var(--green); }
.diff-btn.easy.active, .diff-btn.easy:hover { background: var(--green); color: white; }
.diff-btn.medium { border-color: var(--gold); color: var(--gold); }
.diff-btn.medium.active, .diff-btn.medium:hover { background: var(--gold); color: white; }
.diff-btn.hard { border-color: var(--accent); color: var(--accent); }
.diff-btn.hard.active, .diff-btn.hard:hover { background: var(--accent); color: white; }

.step-divider {
  border: none;
  border-top: 1px dashed var(--border);
  margin: 20px 0;
}

/* 평가 결과 탭 */
.eval-tab-bar {
  display: flex;
  gap: 4px;
  background: var(--bg);
  padding: 4px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  margin-bottom: 16px;
}

.eval-tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text-tertiary);
  transition: all 0.2s;
  border: none;
  background: transparent;
  font-family: inherit;
}

.eval-tab:hover { color: var(--text-secondary); }
.eval-tab.active.easy { background: var(--green); color: white; }
.eval-tab.active.medium { background: var(--gold); color: white; }
.eval-tab.active.hard { background: var(--accent); color: white; }

.eval-tab .eval-score {
  display: block;
  font-size: 11px;
  font-weight: 400;
  margin-top: 2px;
  opacity: 0.7;
}

.eval-content { display: none; }
.eval-content.active { display: block; }
</style>
</head>
<body>

<div class="auth-overlay hidden" id="authLogin"></div>
<div class="auth-overlay hidden" id="authSignup"></div>

<div id="mainApp" style="display:none;">

<div class="header">
  <div class="logo">
    <a href="index.html" style="display:flex;align-items:center;gap:14px;text-decoration:none;">
      <img src="logo-kornferry.png" alt="Korn Ferry" class="logo-img">
      <div>
        <div class="logo-text">SPIN Selling</div>
        <div class="logo-sub">AI-Powered Training</div>
      </div>
    </a>
  </div>
  <div class="header-right">
    <div class="team-badge" id="headerTeam"></div>
    <div class="score-display" id="headerScore">0 점</div>
  </div>
</div>

<div id="navPlaceholder" data-active="roleplay"></div>

<div class="main">
<div class="section">
  <div class="card">
    <div class="card-title"><span class="icon">🎭</span> AI 고객 롤플레이</div>
    <p style="color: var(--text-muted); margin-bottom: 16px; font-size: 13px;">
      AI가 고객 역할을 합니다. 산업분야와 난이도를 선택한 후 SPIN 질문으로 상담하세요.
    </p>

    <!-- 진행 안내 -->
    <div style="background:linear-gradient(135deg, var(--pastel-blue), var(--pastel-green)); border:1.5px solid rgba(36,113,163,0.12); border-radius:12px; padding:18px 20px; margin-bottom:20px;">
      <div style="font-size:14px; font-weight:700; color:var(--text); margin-bottom:10px;">진행 방법</div>
      <div style="display:grid; grid-template-columns:auto 1fr; gap:8px 12px; font-size:13px; color:var(--text-secondary); line-height:1.6;">
        <span style="background:var(--blue); color:white; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800;">1</span>
        <span>산업분야 선택 (아래 탭 클릭)</span>
        <span style="background:var(--gold); color:white; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800;">2</span>
        <span>난이도 선택 (하 / 중 / 상)</span>
        <span style="background:var(--accent); color:white; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800;">3</span>
        <span>SPIN 질문으로 고객과 상담 (최소 5턴 이상)</span>
        <span style="background:var(--purple); color:white; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800;">4</span>
        <span><strong>'AI평가받기'</strong> 버튼 클릭</span>
      </div>
      <div style="margin-top:12px; padding-top:10px; border-top:1px solid rgba(36,113,163,0.1); font-size:12px; color:var(--text-tertiary); line-height:1.6;">
        <strong style="color:var(--accent);">난이도별 1회씩 총 3회</strong> 실시하여 난이도(하/중/상) 모든 탭의 평가를 완료하세요.
      </div>
    </div>

    <!-- 1단계: 산업분야 선택 -->
    <div class="step-label">
      <span class="step-num">1</span>
      <span class="step-text">산업분야 선택</span>
    </div>
    <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; margin-left:38px;" id="roleplayBtns"></div>

    <div id="scenarioDesc" style="display:none; padding:14px 18px; background:linear-gradient(135deg, var(--pastel-blue), var(--pastel-green)); border:1.5px solid rgba(36,113,163,0.12); border-radius:12px; margin-bottom:8px; margin-left:38px;"></div>

    <hr class="step-divider">

    <!-- 2단계: 난이도 선택 -->
    <div class="step-label">
      <span class="step-num" style="background:var(--gold);">2</span>
      <span class="step-text">난이도 선택</span>
    </div>
    <div style="display:flex; gap:10px; margin-left:38px; margin-bottom:8px;">
      <button class="diff-btn easy" onclick="selectDifficulty('easy')">난이도(하)</button>
      <button class="diff-btn medium" onclick="selectDifficulty('medium')">난이도(중)</button>
      <button class="diff-btn hard" onclick="selectDifficulty('hard')">난이도(상)</button>
    </div>
    <div id="diffDesc" style="display:none; margin-left:38px; padding:10px 14px; background:var(--bg); border:1px solid var(--border); border-radius:8px; font-size:12px; color:var(--text-tertiary); line-height:1.6; margin-bottom:8px;"></div>

    <hr class="step-divider">

    <!-- 3단계: 상담하기 -->
    <div class="step-label">
      <span class="step-num" style="background:var(--accent);">3</span>
      <span class="step-text">상담하기</span>
    </div>

    <div class="chat-container" id="chatContainer" style="margin-left:38px;"></div>

    <div class="chat-input-area" style="margin-left:38px;">
      <input type="text" class="chat-input" id="chatInput" placeholder="질문을 입력하세요..." onkeypress="if(event.key==='Enter')sendChat()">
      <button class="btn btn-primary" onclick="sendChat()">전송</button>
    </div>

    <div id="roleplayAnalysis" style="margin-top:16px; margin-left:38px; display:none;">
      <div class="ai-feedback">
        <div class="ai-label">🤖 AI 실시간 분석</div>
        <div id="roleplayAnalysisContent"></div>
      </div>
    </div>

    <hr class="step-divider">

    <!-- 4단계: AI평가받기 -->
    <div class="step-label">
      <span class="step-num" style="background:var(--purple);">4</span>
      <span class="step-text">AI평가받기</span>
    </div>

    <div style="margin-left:38px;">
      <div class="eval-tab-bar" style="margin-bottom:12px;">
        <button class="eval-tab easy" onclick="switchEvalTab('easy')">
          난이도(하)
          <span class="eval-score" id="evalScoreEasy">미완료</span>
        </button>
        <button class="eval-tab medium" onclick="switchEvalTab('medium')">
          난이도(중)
          <span class="eval-score" id="evalScoreMedium">미완료</span>
        </button>
        <button class="eval-tab hard" onclick="switchEvalTab('hard')">
          난이도(상)
          <span class="eval-score" id="evalScoreHard">미완료</span>
        </button>
      </div>

      <div style="margin-bottom:16px;">
        <button class="btn btn-gold" onclick="requestAIEvaluation()" style="width:100%; justify-content:center; font-size:15px; padding:14px;">🤖 현재 상담 AI평가받기</button>
      </div>

      <div class="eval-content" id="evalContentEasy"></div>
      <div class="eval-content" id="evalContentMedium"></div>
      <div class="eval-content" id="evalContentHard"></div>
    </div>
  </div>
</div>
</div>

<div id="footerPlaceholder"></div>
</div>

<script src="common.js"></script>
<script src="roleplay.js"></script>
</body>
</html>
