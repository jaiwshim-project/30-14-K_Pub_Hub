<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPIN Selling - LMS 연동</title>
<link rel="stylesheet" href="common.css">
<style>
.lms-container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

.lms-export-area { background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 20px; margin-top: 20px; }
.lms-code { width: 100%; min-height: 300px; padding: 16px; background: #1e293b; color: #e2e8f0; border: none; border-radius: 10px; font-family: 'Consolas', monospace; font-size: 13px; line-height: 1.6; resize: vertical; }

.lms-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.lms-stat { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
.lms-stat-value { font-size: 24px; font-weight: 900; color: var(--accent2); }
.lms-stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

.lms-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 20px; }
.lms-table th { padding: 10px 12px; text-align: left; font-size: 12px; font-weight: 700; color: var(--text-muted); border-bottom: 2px solid var(--border); }
.lms-table td { padding: 8px 12px; border-bottom: 1px solid var(--border-light); }
.lms-table tr:hover td { background: var(--bg); }

.lms-format-tabs { display: flex; gap: 4px; margin-bottom: 16px; }
.lms-format-tab { padding: 8px 20px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--card); font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-muted); transition: all 0.2s; }
.lms-format-tab.active { background: var(--accent2); color: white; border-color: var(--accent2); }
</style>
</head>
<body>
<div class="auth-overlay hidden" id="authLogin"></div>
<div class="auth-overlay hidden" id="authSignup"></div>
<div id="mainApp" style="display:none;">
<div class="header">
  <div class="logo">
    <a href="index.html" style="display:flex;align-items:center;gap:14px;text-decoration:none;">
      <img src="logo-kornferry.png" alt="Korn Ferry" class="logo-img">
      <div>
        <div class="logo-text">SPIN Selling <span style="color:var(--gold-light);">AI</span></div>
        <div class="logo-sub">AI-Powered Training</div>
      </div>
    </a>
  </div>
</div>
<div id="navPlaceholder" data-active=""></div>

<div class="lms-container">
  <div class="card" style="margin-bottom:20px;">
    <div class="card-title"><span class="icon">🔗</span> LMS 연동 (xAPI / CSV)</div>
    <p style="color:var(--text-tertiary); font-size:13px;">교육 이수 데이터를 xAPI 또는 CSV 형식으로 내보내 기업 LMS에 연동합니다.</p>
  </div>

  <div class="lms-stats">
    <div class="lms-stat"><div class="lms-stat-value" id="lmsMembers">0</div><div class="lms-stat-label">교육생</div></div>
    <div class="lms-stat"><div class="lms-stat-value" id="lmsCompleted">0</div><div class="lms-stat-label">수료 (300점+)</div></div>
    <div class="lms-stat"><div class="lms-stat-value" id="lmsAvg">0</div><div class="lms-stat-label">평균 점수</div></div>
  </div>

  <table class="lms-table">
    <thead><tr><th>이름</th><th>팀</th><th>이메일</th><th>총점</th><th>수료</th></tr></thead>
    <tbody id="lmsTableBody"></tbody>
  </table>

  <div class="lms-export-area">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <div class="lms-format-tabs">
        <button class="lms-format-tab active" onclick="switchFormat('xapi', this)">xAPI JSON</button>
        <button class="lms-format-tab" onclick="switchFormat('csv', this)">CSV</button>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-secondary" style="font-size:12px; padding:8px 16px;" onclick="copyExport()">📋 복사</button>
        <button class="btn btn-primary" style="font-size:12px; padding:8px 16px;" onclick="downloadExport()">💾 다운로드</button>
      </div>
    </div>
    <textarea class="lms-code" id="lmsExportCode" readonly></textarea>
  </div>
</div>

<div id="footerPlaceholder"></div>
</div>

<script src="common.js"></script>
<script>
let exportData = '';
let currentFormat = 'xapi';
let membersData = [];

async function loadLMSData() {
  const session = getSavedSession();
  if (!session) return;

  const members = await fetchAllMembers();
  membersData = members.filter(m => m.name && m.name.trim());

  const totalMembers = membersData.length;
  let totalScore = 0;
  let completedCount = 0;

  membersData.forEach(m => {
    const score = (m.score_quiz||0) + (m.score_needs||0) + (m.score_scenario||0) + (m.score_practice||0) + (m.score_roleplay||0) + (m.score_fab||0);
    m._total = score;
    totalScore += score;
    if (score >= 300) completedCount++;
  });

  document.getElementById('lmsMembers').textContent = totalMembers;
  document.getElementById('lmsCompleted').textContent = completedCount;
  document.getElementById('lmsAvg').textContent = totalMembers > 0 ? Math.round(totalScore / totalMembers) : 0;

  document.getElementById('lmsTableBody').innerHTML = membersData.map(m =>
    '<tr><td style="font-weight:700;">' + m.name + '</td><td>팀 ' + m.team_id + '</td><td>' + (m.email || '-') + '</td><td>' + m._total + '/600</td><td>' + (m._total >= 300 ? '<span style="color:var(--green);font-weight:700;">수료</span>' : '<span style="color:var(--text-disabled);">미수료</span>') + '</td></tr>'
  ).join('');

  generateExport();
}

function switchFormat(format, btn) {
  currentFormat = format;
  document.querySelectorAll('.lms-format-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  generateExport();
}

function generateExport() {
  const session = getSavedSession();
  if (currentFormat === 'xapi') {
    const statements = membersData.map(m => ({
      actor: {
        name: m.name,
        mbox: 'mailto:' + (m.email || m.name.replace(/\s/g,'') + '@example.com')
      },
      verb: {
        id: m._total >= 300 ? 'http://adlnet.gov/expapi/verbs/completed' : 'http://adlnet.gov/expapi/verbs/attempted',
        display: { 'ko-KR': m._total >= 300 ? '수료' : '참가' }
      },
      object: {
        id: 'https://spin-selling.vercel.app/course/spin-selling-3.0',
        definition: {
          name: { 'ko-KR': 'SPIN Selling 3.0 교육' },
          description: { 'ko-KR': 'Korn Ferry 공인 SPIN Selling AI 교육 프로그램' },
          type: 'http://adlnet.gov/expapi/activities/course'
        }
      },
      result: {
        score: { raw: m._total, min: 0, max: 600, scaled: Math.round(m._total / 600 * 100) / 100 },
        completion: m._total >= 300,
        success: m._total >= 300
      },
      context: {
        extensions: {
          'https://spin-selling.vercel.app/context/company': session ? session.company_name : '',
          'https://spin-selling.vercel.app/context/training-date': session ? session.training_date : '',
          'https://spin-selling.vercel.app/context/team': m.team_id,
          'https://spin-selling.vercel.app/context/scores': {
            quiz: m.score_quiz || 0,
            needs: m.score_needs || 0,
            scenario: m.score_scenario || 0,
            practice: m.score_practice || 0,
            roleplay: m.score_roleplay || 0,
            fab: m.score_fab || 0
          }
        }
      },
      timestamp: new Date().toISOString()
    }));
    exportData = JSON.stringify(statements, null, 2);
  } else {
    const header = '이름,팀,이메일,퀴즈,니즈,질문구분,질문연습,롤플레이,FAB,총점,수료여부\n';
    const rows = membersData.map(m =>
      [m.name, m.team_id, m.email||'', m.score_quiz||0, m.score_needs||0, m.score_scenario||0, m.score_practice||0, m.score_roleplay||0, m.score_fab||0, m._total, m._total>=300?'수료':'미수료'].join(',')
    ).join('\n');
    exportData = header + rows;
  }
  document.getElementById('lmsExportCode').value = exportData;
}

async function copyExport() {
  try {
    await navigator.clipboard.writeText(exportData);
    alert('클립보드에 복사되었습니다.');
  } catch(e) {
    document.getElementById('lmsExportCode').select();
    document.execCommand('copy');
    alert('복사되었습니다.');
  }
}

function downloadExport() {
  const ext = currentFormat === 'xapi' ? 'json' : 'csv';
  const mime = currentFormat === 'xapi' ? 'application/json' : 'text/csv';
  const blob = new Blob([exportData], { type: mime + ';charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const session = getSavedSession();
  a.download = 'spin-selling-' + (session ? session.company_name : 'export') + '.' + ext;
  a.click();
  URL.revokeObjectURL(url);
}

document.addEventListener('DOMContentLoaded', () => setTimeout(loadLMSData, 200));
</script>
</body>
</html>
