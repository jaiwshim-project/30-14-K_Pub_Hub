<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPIN Selling 2.0 & 3.0 - FAB/BAF</title>
<link rel="stylesheet" href="common.css">
</head>
<body>

<div class="auth-overlay hidden" id="authLogin"></div>
<div class="auth-overlay hidden" id="authSignup"></div>

<div id="mainApp" style="display:none;">

<div class="header">
  <div class="logo">
    <a href="index.html" style="display:flex;align-items:center;gap:14px;text-decoration:none;">
      <img src="logo-kornferry.png" alt="Korn Ferry" class="logo-img">
      <div>
        <div class="logo-text">SPIN Selling 2.0 & 3.0</div>
        <div class="logo-sub">AI-Powered Training</div>
      </div>
    </a>
  </div>
  <div class="header-right">
    <div class="team-badge" id="headerTeam"></div>
    <div class="score-display" id="headerScore">0 점</div>
  </div>
</div>

<div id="navPlaceholder" data-active="fab"></div>

<div class="main">
<div class="section">
  <div class="card">
    <div class="card-title"><span class="icon">🧩</span> 특징(F) - 장점(A) - 이익(B) 구분</div>
    <p style="color: var(--text-muted); margin-bottom: 16px; font-size: 13px;">
      <strong>특징(Feature)</strong>: 제품/서비스의 사실적 설명<br>
      <strong>장점(Advantage)</strong>: 특징이 어떻게 사용될 수 있는지<br>
      <strong>이익(Benefit)</strong>: 고객이 표현한 현재니즈를 충족시키는 방법
    </p>

    <div id="fabCards"></div>
    <div style="margin-top: 16px;">
      <button class="btn btn-primary" onclick="checkFab()">정답 확인</button>
      <button class="btn btn-secondary" onclick="startFab()">다시 하기</button>
    </div>
    <div id="fabResult" style="margin-top: 16px; display:none;"></div>
  </div>
</div>
</div>

<div id="flowNavPlaceholder"></div>
<div id="footerPlaceholder"></div>
</div>

<script src="common.js"></script>
<script src="fab.js"></script>
</body>
</html>
