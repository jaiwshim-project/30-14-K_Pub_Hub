<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPIN Selling - AI 교육 플랫폼</title>
<link rel="stylesheet" href="common.css">
<style>
/* ========== SESSION CARDS ========== */
.session-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 14px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.2s;
}

.session-card:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow-hover);
  transform: translateX(4px);
}

.session-card-name {
  font-size: 18px;
  font-weight: 800;
  color: var(--text);
}

.session-card-date {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
}

.session-card-arrow {
  font-size: 24px;
  color: var(--accent);
  font-weight: 700;
}

/* Admin link */
.admin-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 24px;
  padding: 10px 20px;
  background: var(--bg);
  border: 1px dashed var(--border);
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
}

.admin-link:hover {
  border-color: var(--text-muted);
  color: var(--text);
  background: var(--card);
}
</style>
</head>
<body>

<div class="auth-overlay hidden" id="authLogin"></div>
<div class="auth-overlay hidden" id="authSignup"></div>

<div id="mainApp" style="display:none;">

<!-- Header -->
<div class="header">
  <div class="logo">
    <a href="index.html" style="display:flex; align-items:center; gap:10px; text-decoration:none; color:inherit;">
      <img src="logo-kornferry.png" alt="Korn Ferry" class="logo-img">
      <div>
        <div class="logo-text">SPIN Selling</div>
        <div class="logo-sub">AI-Powered Training</div>
      </div>
    </a>
  </div>
  <div class="header-right">
    <div class="team-badge" id="headerTeam"></div>
    <div class="score-display" id="headerScore" style="display:none;">0 점</div>
  </div>
</div>

<div id="navPlaceholder" data-active="home"></div>

<div class="main">
<div class="section">

<!-- ========== 랜딩: 현재교육 선택 ========== -->

  <div class="hero" style="padding:0; overflow:hidden; border-radius:var(--radius);">
    <img src="cover-spin.png" alt="SPIN 3.0 Sales Performance" style="width:100%; display:block; border-radius:var(--radius);">
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">🏢</span> 현재 진행 중인 교육</div>
    <div id="sessionList" style="font-size:13px; color:var(--text-tertiary);">불러오는 중...</div>
  </div>

  <!-- 관리자 영역 -->
  <div style="text-align:center;">
    <div class="admin-link" onclick="showAdminPanel()">
      <span>🔧</span> 시스템 관리자 (교육 생성 / 교육생 등록)
    </div>
  </div>

  <!-- 관리자 패널 (숨김) -->
  <div id="adminPanel" style="display:none; margin-top:24px;">
    <div class="card" style="border-left:4px solid #e74c3c;">
      <div class="card-title"><span class="icon">🔧</span> 시스템 관리자</div>
      <p style="color:var(--text-tertiary); margin-bottom:16px; font-size:13px;">
        새 교육 세션을 생성하고 교육생 명단을 등록합니다.
      </p>

      <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px;">
        <input type="text" id="newCompanyName" placeholder="교육 회사명 (예: 현대자동차)" style="flex:2; min-width:200px; padding:12px 16px; border:1.5px solid var(--border); border-radius:10px; font-family:inherit; font-size:14px; background:var(--bg); color:var(--text);">
        <input type="text" id="newTrainingDate" placeholder="교육일 (예: 2026.04.14~15)" style="flex:1; min-width:160px; padding:12px 16px; border:1.5px solid var(--border); border-radius:10px; font-family:inherit; font-size:14px; background:var(--bg); color:var(--text);">
        <input type="text" id="newPassword" placeholder="입장 비밀번호 (숫자)" style="flex:1; min-width:120px; padding:12px 16px; border:1.5px solid var(--border); border-radius:10px; font-family:inherit; font-size:14px; background:var(--bg); color:var(--text); letter-spacing:2px;">
        <button class="btn btn-primary" onclick="handleCreateSession()">교육 생성</button>
      </div>

      <div id="adminSessionList" style="margin-top:16px;"></div>
    </div>
  </div>

</div>
</div>

<!-- 비밀번호 확인 모달 -->
<div class="modal-overlay" id="pwModal">
  <div class="modal" style="max-width:360px; text-align:center;">
    <h2 style="font-size:18px; margin-bottom:4px;">입장 비밀번호</h2>
    <p style="font-size:13px; color:var(--text-tertiary); margin-bottom:20px;" id="pwModalSession"></p>
    <input type="password" id="pwInput" inputmode="numeric" maxlength="10" placeholder="비밀번호 입력"
      style="width:100%; padding:14px; border:2px solid var(--border); border-radius:12px; font-family:inherit; font-size:20px; font-weight:700; text-align:center; letter-spacing:6px; color:var(--text); background:var(--bg); transition:border-color 0.2s; margin-bottom:8px;"
      onkeyup="if(event.key==='Enter') checkPassword()">
    <div id="pwError" style="display:none; font-size:12px; color:var(--accent); font-weight:600; margin-bottom:12px;"></div>
    <div style="display:flex; gap:8px;">
      <button onclick="closeModal('pwModal')" class="btn btn-secondary" style="flex:1;">취소</button>
      <button onclick="checkPassword()" class="btn btn-primary" style="flex:1;">입장</button>
    </div>
  </div>
</div>

<div id="footerPlaceholder"></div>

</div><!-- /mainApp -->

<script src="common.js"></script>
<script>
// ========== SESSION LIST ==========
async function loadSessionList() {
  const sessions = await fetchSessions();
  const listEl = document.getElementById('sessionList');

  if (sessions.length === 0) {
    listEl.innerHTML = '<p style="color:var(--text-disabled); text-align:center; padding:24px;">진행 중인 교육이 없습니다.<br>시스템 관리자에게 교육 생성을 요청하세요.</p>';
    return;
  }

  // 각 세션별 교육생 수 조회
  const sessionCards = await Promise.all(sessions.map(async s => {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/spin_members?session_id=eq.${s.id}&name=neq.&select=id`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    const members = await res.json();
    const memberCount = Array.isArray(members) ? members.length : 0;
    const date = s.training_date || '';
    return `
      <div class="session-card" onclick="selectSession('${s.id}', '${s.company_name.replace(/'/g,"\\'")}', '${date.replace(/'/g,"\\'")}')">
        <div>
          <div class="session-card-name">${s.company_name}</div>
          <div style="display:flex; align-items:center; gap:12px; margin-top:4px;">
            ${date ? `<span class="session-card-date" style="margin:0;">${date}</span>` : ''}
            <span style="font-size:12px; font-weight:600; color:var(--blue);">교육생 ${memberCount}명</span>
          </div>
        </div>
        <span class="session-card-arrow">&#8250;</span>
      </div>
    `;
  }));

  listEl.innerHTML = sessionCards.join('');
}

// 비밀번호 확인 후 입장
let pendingSession = null;

function selectSession(id, companyName, trainingDate) {
  pendingSession = { id, company_name: companyName, training_date: trainingDate };
  document.getElementById('pwModalSession').textContent = companyName;
  document.getElementById('pwInput').value = '';
  document.getElementById('pwError').style.display = 'none';
  document.getElementById('pwInput').style.borderColor = 'var(--border)';
  document.getElementById('pwModal').classList.add('active');
  setTimeout(() => document.getElementById('pwInput').focus(), 100);
}

async function checkPassword() {
  const input = document.getElementById('pwInput');
  const errorEl = document.getElementById('pwError');
  const entered = input.value.trim();

  if (!entered) {
    errorEl.textContent = '비밀번호를 입력하세요';
    errorEl.style.display = 'block';
    input.style.borderColor = 'var(--accent)';
    return;
  }

  const savedPw = await fetchSessionPassword(pendingSession.id);

  if (savedPw && entered !== savedPw) {
    errorEl.textContent = '비밀번호가 틀립니다';
    errorEl.style.display = 'block';
    input.style.borderColor = 'var(--accent)';
    input.select();
    return;
  }

  // 비밀번호 일치 또는 비밀번호 미설정 → company.html로 이동
  closeModal('pwModal');
  saveSessionId(pendingSession);
  clearUser();
  clearRole();
  location.href = 'company.html';
}

// ========== ADMIN ==========
const ADMIN_PW = '9633';

function showAdminPanel() {
  const pw = prompt('관리자 비밀번호를 입력하세요');
  if (pw !== ADMIN_PW) {
    if (pw !== null) alert('비밀번호가 틀립니다');
    return;
  }
  const panel = document.getElementById('adminPanel');
  panel.style.display = 'block';
  loadAdminSessionList();
}

async function handleCreateSession() {
  const name = document.getElementById('newCompanyName').value.trim();
  const date = document.getElementById('newTrainingDate').value.trim();
  const password = document.getElementById('newPassword').value.trim();
  if (!name) { alert('교육 회사명을 입력하세요.'); return; }
  if (!password) { alert('입장 비밀번호를 설정하세요.'); document.getElementById('newPassword').focus(); return; }

  const btn = event.target;
  btn.textContent = '생성 중...';
  btn.disabled = true;

  const session = await createSession(name, date, password);
  btn.textContent = '교육 생성';
  btn.disabled = false;

  document.getElementById('newCompanyName').value = '';
  document.getElementById('newTrainingDate').value = '';
  document.getElementById('newPassword').value = '';

  alert(`"${name}" 교육이 생성되었습니다.\n입장 비밀번호: ${password}\n팀 편성 페이지에서 교육생 명단을 등록하세요.`);

  // 관리자로 바로 팀 편성 이동
  saveSessionId({ id: session.id, company_name: session.company_name, training_date: session.training_date });
  saveRole('admin');
  location.href = 'team-setup.html';
}

async function loadAdminSessionList() {
  const sessions = await fetchSessions();
  const el = document.getElementById('adminSessionList');
  if (sessions.length === 0) {
    el.innerHTML = '<p style="color:var(--text-disabled);">생성된 교육이 없습니다.</p>';
    return;
  }

  el.innerHTML = '<div style="font-size:12px; font-weight:700; color:var(--text-muted); margin-bottom:8px;">기존 교육 관리</div>' +
    sessions.map(s => {
      const isEnded = s.team_names && s.team_names.ended;
      return `
      <div style="display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:${isEnded ? 'rgba(192,57,43,0.03)' : 'var(--bg)'}; border:1px solid ${isEnded ? 'rgba(192,57,43,0.15)' : 'var(--border)'}; border-radius:8px; margin-bottom:6px;">
        <div style="display:flex; align-items:center; gap:8px;">
          <span style="font-weight:700; font-size:13px; ${isEnded ? 'color:var(--text-muted);' : ''}">${s.company_name}</span>
          ${isEnded ? '<span style="color:#c0392b; font-size:11px; font-weight:800;">교육종료</span>' : ''}
          <span style="color:var(--text-muted); font-size:11px;">${s.training_date || ''}</span>
        </div>
        <div style="display:flex; gap:6px;">
          <button onclick="adminToggleEnded('${s.id}', ${!isEnded})"
            style="font-size:11px; padding:4px 12px; background:${isEnded ? 'rgba(30,132,73,0.08)' : 'rgba(212,136,15,0.08)'}; color:${isEnded ? 'var(--green)' : 'var(--gold)'}; border:1px solid ${isEnded ? 'rgba(30,132,73,0.2)' : 'rgba(212,136,15,0.2)'}; border-radius:6px; cursor:pointer; font-family:inherit; font-weight:600;">${isEnded ? '재개' : '종료'}</button>
          <button onclick="adminEnterSession('${s.id}', '${s.company_name.replace(/'/g,"\\'")}', '${(s.training_date||'').replace(/'/g,"\\'")}')"
            class="btn btn-secondary" style="font-size:11px; padding:4px 12px;">팀 편성</button>
          <button onclick="adminDeleteSession('${s.id}', '${s.company_name.replace(/'/g,"\\'")}')"
            style="font-size:11px; padding:4px 12px; background:rgba(192,57,43,0.08); color:var(--accent); border:1px solid rgba(192,57,43,0.2); border-radius:6px; cursor:pointer; font-family:inherit; font-weight:600; transition:all 0.2s;"
            onmouseover="this.style.background='var(--accent)';this.style.color='white'" onmouseout="this.style.background='rgba(192,57,43,0.08)';this.style.color='var(--accent)'">삭제</button>
        </div>
      </div>`;
    }).join('');
}

async function adminToggleEnded(sessionId, ended) {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/spin_sessions?id=eq.${sessionId}&select=team_names`,
    { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
  );
  const data = await res.json();
  const teamNames = (data && data[0] && data[0].team_names) || {};
  teamNames.ended = ended;

  await fetch(`${SUPABASE_URL}/rest/v1/spin_sessions?id=eq.${sessionId}`, {
    method: 'PATCH',
    headers: SB_HEADERS,
    body: JSON.stringify({ team_names: teamNames })
  });

  loadAdminSessionList();
}

async function adminDeleteSession(id, name) {
  if (!confirm(`"${name}" 교육을 삭제하시겠습니까?\n팀원 데이터도 모두 삭제됩니다.`)) return;

  // 세션을 삭제 표시 (company_name을 빈 문자열로)
  await fetch(`${SUPABASE_URL}/rest/v1/spin_sessions?id=eq.${id}`, {
    method: 'PATCH',
    headers: SB_HEADERS,
    body: JSON.stringify({ company_name: '', memo: '[deleted]' })
  });

  // 멤버 이름 초기화
  await fetch(`${SUPABASE_URL}/rest/v1/spin_members?session_id=eq.${id}`, {
    method: 'PATCH',
    headers: SB_HEADERS,
    body: JSON.stringify({ name: '', score_quiz: 0, score_needs: 0, score_scenario: 0, score_practice: 0, score_roleplay: 0, score_fab: 0 })
  });

  alert(`"${name}" 교육이 삭제되었습니다.`);
  loadAdminSessionList();
  loadSessionList();
}

function adminEnterSession(id, name, date) {
  saveSessionId({ id, company_name: name, training_date: date });
  saveRole('admin');
  location.href = 'team-setup.html';
}

// ========== INIT ==========
document.addEventListener('DOMContentLoaded', function() {
  const session = getSavedSession();
  const role = getSavedRole();
  const user = getSavedUser();

  // 이미 로그인 상태면 company.html로
  if (session && (role === 'trainer' || role === 'trainee') && user) {
    location.href = 'company.html';
    return;
  }

  // 세션만 있으면 company.html로 (역할 선택 화면)
  if (session && !role) {
    location.href = 'company.html';
    return;
  }

  // 랜딩 표시
  loadSessionList();

  if (localStorage.getItem('spin_open_admin') === '1') {
    localStorage.removeItem('spin_open_admin');
    setTimeout(() => showAdminPanel(), 500);
  }
});
</script>
</body>
</html>
