<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPIN Selling - 질문 라이브러리</title>
<link rel="stylesheet" href="common.css">
<style>
.lib-container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

.lib-search { width: 100%; padding: 14px 20px; border: 2px solid var(--border); border-radius: 14px; font-family: inherit; font-size: 15px; color: var(--text); background: var(--card); margin-bottom: 20px; transition: border-color 0.2s; }
.lib-search:focus { outline: none; border-color: var(--accent2); }

.lib-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.lib-filter { padding: 8px 16px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--card); font-family: inherit; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
.lib-filter:hover { border-color: var(--accent2); color: var(--text); }
.lib-filter.active { background: var(--accent2); color: white; border-color: var(--accent2); }

.spin-type-filters { display: flex; gap: 6px; margin-bottom: 24px; }
.spin-type-btn { padding: 8px 20px; border: 2px solid var(--border); border-radius: 10px; background: var(--card); font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.spin-type-btn.active-S { background: #e8f4fd; border-color: #5dade2; color: #2980b9; }
.spin-type-btn.active-P { background: #fef5e7; border-color: #f39c12; color: #d68910; }
.spin-type-btn.active-I { background: #fdedec; border-color: #e74c3c; color: #c0392b; }
.spin-type-btn.active-N { background: #eafaf1; border-color: #2ecc71; color: #1e8449; }

.lib-grid { display: grid; gap: 14px; }
.lib-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 20px; cursor: pointer; transition: all 0.2s; }
.lib-card:hover { border-color: var(--accent2); box-shadow: 0 4px 16px rgba(0,0,0,0.06); transform: translateY(-2px); }
.lib-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.lib-spin-badge { padding: 4px 12px; border-radius: 8px; font-size: 12px; font-weight: 800; }
.badge-S { background: #e8f4fd; color: #2980b9; }
.badge-P { background: #fef5e7; color: #d68910; }
.badge-I { background: #fdedec; color: #c0392b; }
.badge-N { background: #eafaf1; color: #1e8449; }
.lib-industry { font-size: 12px; color: var(--text-muted); font-weight: 600; }
.lib-question { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.6; }
.lib-tip { display: none; margin-top: 12px; padding: 12px 16px; background: var(--bg); border-radius: 10px; font-size: 13px; color: var(--text-tertiary); line-height: 1.7; }
.lib-card.open .lib-tip { display: block; }
.lib-count { font-size: 14px; color: var(--text-muted); margin-bottom: 16px; }
</style>
</head>
<body>
<div class="auth-overlay hidden" id="authLogin"></div>
<div class="auth-overlay hidden" id="authSignup"></div>
<div id="mainApp" style="display:none;">
<div class="header">
  <div class="logo">
    <a href="index.html" style="display:flex;align-items:center;gap:14px;text-decoration:none;">
      <img src="logo-kornferry.png" alt="Korn Ferry" class="logo-img">
      <div>
        <div class="logo-text">SPIN Selling <span style="color:var(--gold-light);">AI</span></div>
        <div class="logo-sub">AI-Powered Training</div>
      </div>
    </a>
  </div>
</div>
<div id="navPlaceholder" data-active=""></div>
<div class="lib-container">
  <div class="card" style="margin-bottom:24px;">
    <div class="card-title"><span class="icon">📚</span> SPIN 질문 라이브러리</div>
    <p style="color:var(--text-tertiary); font-size:13px; margin-bottom:16px;">산업별 우수 SPIN 질문 예시 132개. 실전에서 바로 활용하세요.</p>
    <input class="lib-search" type="text" placeholder="🔍 질문 검색..." id="libSearch" oninput="filterQuestions()">
  </div>

  <div class="lib-filters" id="industryFilters"></div>

  <div class="spin-type-filters">
    <button class="spin-type-btn active-S" data-type="all" onclick="setSpinFilter('all', this)">전체</button>
    <button class="spin-type-btn" data-type="S" onclick="setSpinFilter('S', this)">S 상황</button>
    <button class="spin-type-btn" data-type="P" onclick="setSpinFilter('P', this)">P 문제</button>
    <button class="spin-type-btn" data-type="I" onclick="setSpinFilter('I', this)">I 시사</button>
    <button class="spin-type-btn" data-type="N" onclick="setSpinFilter('N', this)">N 해결</button>
  </div>

  <div class="lib-count" id="libCount"></div>
  <div class="lib-grid" id="libGrid"></div>
</div>
<div id="footerPlaceholder"></div>
</div>
<script src="common.js"></script>

const INDUSTRIES = [...new Set(QUESTIONS.map(q => q.ind))];
let activeIndustry = 'all';
let activeSpinType = 'all';

function init() {
  const filterDiv = document.getElementById('industryFilters');
  filterDiv.innerHTML = '<button class="lib-filter active" onclick="setIndustry(\'all\', this)">전체</button>' +
    INDUSTRIES.map(ind => '<button class="lib-filter" onclick="setIndustry(\'' + ind + '\', this)">' + ind + '</button>').join('');
  filterQuestions();
}

function setIndustry(ind, btn) {
  activeIndustry = ind;
  document.querySelectorAll('.lib-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterQuestions();
}

function setSpinFilter(type, btn) {
  activeSpinType = type;
  document.querySelectorAll('.spin-type-btn').forEach(b => { b.className = 'spin-type-btn'; });
  btn.classList.add('active-' + (type === 'all' ? 'S' : type));
  filterQuestions();
}

function filterQuestions() {
  const search = (document.getElementById('libSearch').value || '').toLowerCase();
  let filtered = QUESTIONS;
  if (activeIndustry !== 'all') filtered = filtered.filter(q => q.ind === activeIndustry);
  if (activeSpinType !== 'all') filtered = filtered.filter(q => q.type === activeSpinType);
  if (search) filtered = filtered.filter(q => q.q.toLowerCase().includes(search) || q.ind.toLowerCase().includes(search) || q.tip.toLowerCase().includes(search));

  document.getElementById('libCount').textContent = filtered.length + '개 질문';
  document.getElementById('libGrid').innerHTML = filtered.map((q, i) =>
    '<div class="lib-card" onclick="this.classList.toggle(\'open\')">' +
    '<div class="lib-card-top"><span class="lib-spin-badge badge-' + q.type + '">' + q.type + '</span><span class="lib-industry">' + q.ind + '</span></div>' +
    '<div class="lib-question">"' + q.q + '"</div>' +
    '<div class="lib-tip">💡 ' + q.tip + '</div></div>'
  ).join('');
}

document.addEventListener('DOMContentLoaded', () => setTimeout(init, 200));
