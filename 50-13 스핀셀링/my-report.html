<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPIN Selling AI - 내 AI 분석 리포트</title>
<link rel="stylesheet" href="common.css">
<style>
@media print {
  .header, .nav, .footer, .no-print, #footerPlaceholder, #userIdentityBar { display: none !important; }
  .report-page { box-shadow: none !important; border: none !important; margin: 0 !important; }
  body { background: white !important; }
}

.report-page {
  background: #ffffff;
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  overflow: hidden;
  margin-bottom: 24px;
}

.report-header {
  background: linear-gradient(135deg, #0a2240, #0d3161);
  padding: 32px 40px;
  color: white;
}

.report-header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 20px;
}

.report-logo { display: flex; align-items: center; gap: 12px; }
.report-logo img { height: 32px; }
.report-logo-text { font-size: 18px; font-weight: 800; }
.report-logo-sub { font-size: 10px; letter-spacing: 2px; opacity: 0.7; }
.report-date { font-size: 12px; opacity: 0.6; }

.report-title {
  font-size: 28px;
  font-weight: 900;
  margin-bottom: 8px;
}

.report-subtitle { font-size: 14px; opacity: 0.8; }

.report-info-bar {
  display: flex;
  gap: 24px;
  padding: 16px 40px;
  background: #f0f3f8;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.report-info-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

.report-info-label { font-size: 11px; color: var(--text-muted); font-weight: 600; }
.report-info-value { font-size: 14px; color: var(--text); font-weight: 700; }

.report-body { padding: 32px 40px; }

.report-section {
  margin-bottom: 28px;
}

.report-section-title {
  font-size: 16px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--kf-navy);
  display: flex;
  align-items: center;
  gap: 8px;
}

.report-section-num {
  background: var(--kf-navy);
  color: white;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 800;
}

/* Score table */
.score-tbl { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
.score-tbl th { background: #f0f3f8; padding: 10px 14px; text-align: left; font-size: 12px; font-weight: 700; color: var(--text-muted); border-bottom: 2px solid var(--border); }
.score-tbl td { padding: 10px 14px; border-bottom: 1px solid var(--border-light); font-size: 14px; color: var(--text); }
.score-tbl .highlight { font-weight: 800; color: var(--kf-navy); }
.score-tbl .total-row td { background: #f0f3f8; font-weight: 800; border-top: 2px solid var(--kf-navy); }

/* SPIN chart */
.spin-bar-chart { display: flex; flex-direction: column; gap: 8px; }
.spin-bar-row { display: flex; align-items: center; gap: 10px; }
.spin-bar-label { width: 80px; font-size: 13px; font-weight: 700; }
.spin-bar-track { flex: 1; height: 20px; background: var(--border-light); border-radius: 10px; overflow: hidden; }
.spin-bar-fill { height: 100%; border-radius: 10px; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; font-size: 10px; color: white; font-weight: 700; transition: width 0.5s; }
.spin-bar-value { width: 50px; text-align: right; font-size: 13px; font-weight: 700; }

/* Grade badge */
.grade-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  font-size: 20px;
  font-weight: 900;
}

.grade-a { background: linear-gradient(135deg, #1e8449, #27ae60); color: white; }
.grade-b { background: linear-gradient(135deg, #2471a3, #3498db); color: white; }
.grade-c { background: linear-gradient(135deg, #d4880f, #f5a623); color: white; }
.grade-d { background: linear-gradient(135deg, #c0392b, #e74c3c); color: white; }

/* Coaching card */
.coaching-card {
  padding: 16px 20px;
  border-radius: 12px;
  margin-bottom: 10px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.coaching-card.strength { background: rgba(30,132,73,0.06); border-left: 4px solid var(--green); }
.coaching-card.weakness { background: rgba(192,57,43,0.06); border-left: 4px solid var(--accent); }
.coaching-card.tip { background: rgba(36,113,163,0.06); border-left: 4px solid var(--blue); }

/* Email button */
.email-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: white;
  border: 2px solid #b8760c;
  border-radius: 10px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.email-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(212,136,15,0.3); }

/* Loading */
.report-loading {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-muted);
}
.report-loading .spinner {
  width: 48px; height: 48px;
  border: 4px solid var(--border-light);
  border-top: 4px solid var(--kf-navy);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Member select */
#memberSelectWrap {
  display: none;
  align-items: center;
  gap: 8px;
}
#memberSelectWrap select {
  padding: 10px 16px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  font-family: inherit;
  background: var(--card);
  color: var(--text);
  min-width: 260px;
  cursor: pointer;
}
#memberSelectWrap select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(192,57,43,0.1);
}

@media (max-width: 768px) {
  .report-header { padding: 24px 20px; }
  .report-body { padding: 20px; }
  .report-info-bar { padding: 12px 20px; }
  .report-title { font-size: 22px; }
}
</style>
</head>
<body>

<div class="auth-overlay hidden" id="authLogin"></div>
<div class="auth-overlay hidden" id="authSignup"></div>

<div id="mainApp" style="display:none;">

<div class="header">
  <div class="logo">
    <a href="index.html" onclick="clearSessionId();clearUser();clearRole();" style="display:flex;align-items:center;gap:14px;text-decoration:none;">
      <img src="logo-kornferry.png" alt="Korn Ferry" class="logo-img">
      <div>
        <div class="logo-text">SPIN Selling <span style="color:var(--gold-light);">AI</span></div>
        <div class="logo-sub">AI-Powered Training</div>
      </div>
    </a>
  </div>
</div>

<div id="navPlaceholder"></div>

<div class="main">
<div class="section">

<!-- 컨트롤 바 -->
<div class="no-print" style="display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; align-items:center;">
  <!-- 강사/관리자만 보이는 교육생 선택 드롭다운 -->
  <div id="memberSelectWrap">
    <label style="font-size:13px; font-weight:700; color:var(--text);">교육생:</label>
    <select id="memberSelect" onchange="loadMemberReport(this.value)">
      <option value="">교육생 선택...</option>
    </select>
  </div>

  <button class="email-btn" onclick="sendReportEmail()">📧 이메일 발송</button>
  <button class="btn btn-primary" onclick="window.print()">🖨 인쇄 / PDF</button>
  <button class="btn btn-secondary" onclick="location.href='company.html'">← 대시보드</button>
</div>

<!-- 리포트 영역 -->
<div class="report-page" id="reportPage">
  <div class="report-loading" id="reportLoading">
    <div class="spinner"></div>
    <div style="font-size:16px; font-weight:700;">리포트를 불러오는 중...</div>
    <div style="font-size:13px; margin-top:8px;">교육 활동 데이터를 분석하고 있습니다.</div>
  </div>
</div>

</div>
</div>

<div id="footerPlaceholder"></div>
</div>

<script src="common.js"></script>
<script>
// ========== CONFIG ==========
const CAT_MAX = { quiz: 80, needs: 80, scenario: 100, practice: 120, roleplay: 100, fab: 90 };
const TOTAL_MAX = 600;
const CAT_LABELS = {
  quiz: { icon: '📝', name: 'SPIN 개념 퀴즈' },
  needs: { icon: '🎯', name: '니즈 구분 (IN/EN)' },
  scenario: { icon: '🔍', name: 'SPIN 질문구분' },
  practice: { icon: '💬', name: '질문 작성 연습' },
  roleplay: { icon: '🎭', name: 'AI 롤플레이' },
  fab: { icon: '🧩', name: 'FAB/BAF 연습' }
};
const SPIN_COLORS = { S: 'var(--blue)', P: 'var(--accent)', I: 'var(--purple)', N: 'var(--green)' };
const SPIN_HEX = { S: '#5dade2', P: '#f39c12', I: '#e74c3c', N: '#2ecc71' };
const SPIN_NAMES = { S: '상황질문 (Situation)', P: '문제질문 (Problem)', I: '시사질문 (Implication)', N: '해결질문 (Need-Payoff)' };
const SPIN_SHORT = { S: 'S 상황', P: 'P 문제', I: 'I 시사', N: 'N 해결' };
const SPIN_DESC = {
  S: '고객의 현재 상태, 배경, 사실 파악',
  P: '고객의 문제, 어려움, 불만족 탐색',
  I: '문제의 영향, 결과, 파급효과 탐색',
  N: '솔루션의 가치와 유용성'
};

// ========== ISSUE RULES ==========
const issueRules = [
  { id: 'quiz_low', condition: (m) => (m.score_quiz || 0) < 50, issue: '개념 이해 부족', cause: 'SPIN 이론 학습 미흡', strategy: '프리리딩 재학습 + 퀴즈 재도전', action: '교육 후 1주 내 퀴즈 100% 달성' },
  { id: 'p_low', condition: (m, r) => (r.P || 0) < 15, issue: 'Problem 질문 부족', cause: '고객 문제 탐색 역량 약함', strategy: 'Problem 질문 집중 훈련', action: '매일 5개 Problem 질문 작성 연습' },
  { id: 'i_low', condition: (m, r) => (r.I || 0) < 20, issue: '시사질문 확장 미흡', cause: '문제 영향/파급효과 인식 부족', strategy: 'Implication 질문 확장 템플릿 활용', action: '"그 문제가 ~에 미치는 영향은?" 패턴 10회 연습' },
  { id: 'n_low', condition: (m, r) => (r.N || 0) < 15, issue: 'Need-payoff 전환 부족', cause: '해결 가치를 고객이 말하게 하는 기술 부족', strategy: '"만약 ~한다면" 형태 질문 집중 훈련', action: '매 상담 시 N 질문 2개 이상 계획' },
  { id: 'fab_low', condition: (m) => (m.score_fab || 0) < 50, issue: 'FAB 구분 능력 약함', cause: 'Feature/Advantage/Benefit 개념 혼동', strategy: 'FAB 재학습 + BAF 전환 연습', action: '자사 제품 FAB 3세트 작성' },
  { id: 'roleplay_low', condition: (m) => (m.score_roleplay || 0) < 60, issue: '실전 적용력 부족', cause: '이론-실전 연결 미흡', strategy: '롤플레이 반복 연습', action: '주 2회 동료와 SPIN 롤플레이 실시' },
  { id: 'scenario_low', condition: (m) => (m.score_scenario || 0) < 50, issue: 'SPIN 질문 구분력 부족', cause: '질문 유형 판별 기준 모호', strategy: 'SPIN 질문 구분 집중 훈련', action: '하루 20개 질문 분류 연습' },
  { id: 'needs_low', condition: (m) => (m.score_needs || 0) < 50, issue: '니즈 구분력 약함', cause: 'Implied/Explicit 니즈 구분 기준 부족', strategy: '니즈 구분 사례 학습', action: '상담 녹음 분석 시 니즈 유형 표시 연습' },
  { id: 'practice_low', condition: (m) => (m.score_practice || 0) < 50, issue: 'SPIN 질문 작성 미숙', cause: '질문 구성 경험 부족', strategy: 'SPIN 질문 작성 반복 훈련', action: '산업별 SPIN 질문 세트 3개 작성' },
  { id: 's_over', condition: (m, r) => (r.S || 0) > 50, issue: '상황질문 과다 의존', cause: '정보 수집 편중, 심층 탐색 부족', strategy: 'S질문 줄이고 P/I 질문 전환 훈련', action: '상담 시 S질문 3개 이내로 제한하고 P 질문 연결' }
];

// ========== GRADE CALC ==========
function getGrade(score, max) {
  const pct = max > 0 ? (score / max) * 100 : 0;
  if (pct >= 90) return { grade: 'A+', color: 'var(--green)', cls: 'grade-a' };
  if (pct >= 80) return { grade: 'A', color: 'var(--green)', cls: 'grade-a' };
  if (pct >= 70) return { grade: 'B+', color: 'var(--blue)', cls: 'grade-b' };
  if (pct >= 60) return { grade: 'B', color: 'var(--blue)', cls: 'grade-b' };
  if (pct >= 50) return { grade: 'C', color: 'var(--gold)', cls: 'grade-c' };
  return { grade: 'D', color: 'var(--accent)', cls: 'grade-d' };
}

function pct(score, max) {
  return max > 0 ? Math.round((score / max) * 100) : 0;
}

// ========== STATE ==========
let currentMember = null;
let allMembersData = [];
let teamNamesData = {};

// ========== INIT ==========
document.addEventListener('DOMContentLoaded', async function() {
  const role = getSavedRole();
  const user = getSavedUser();
  const session = getSavedSession();

  if (!session) { location.href = 'index.html'; return; }

  // 강사/관리자: 드롭다운 표시 + 교육생 목록 로드
  if (role === 'trainer' || role === 'admin') {
    document.getElementById('memberSelectWrap').style.display = 'flex';
    await loadMemberList();
  }

  // 교육생: 본인 리포트 자동 로드
  if (role === 'trainee' && user && user.id) {
    await loadMemberReport(user.id);
  }
});

// ========== MEMBER LIST (강사/관리자용) ==========
async function loadMemberList() {
  const members = await fetchAllMembers();
  teamNamesData = await fetchTeamNames();
  allMembersData = members;

  const sel = document.getElementById('memberSelect');
  sel.innerHTML = '<option value="">교육생 선택...</option>';

  // 팀별 그룹핑
  const teams = {};
  members.forEach(m => {
    if (!m.name) return; // 이름 없는 슬롯 스킵
    if (!teams[m.team_id]) teams[m.team_id] = [];
    teams[m.team_id].push(m);
  });

  Object.keys(teams).sort().forEach(teamId => {
    const teamName = (teamNamesData && teamNamesData[teamId]) || ('팀 ' + teamId);
    const group = document.createElement('optgroup');
    group.label = teamName;
    teams[teamId].forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = m.name;
      group.appendChild(opt);
    });
    sel.appendChild(group);
  });
}

// ========== LOAD MEMBER REPORT ==========
async function loadMemberReport(memberId) {
  if (!memberId) {
    document.getElementById('reportPage').innerHTML = `
      <div class="report-loading">
        <div style="font-size:48px; margin-bottom:16px;">📋</div>
        <div style="font-size:16px; font-weight:700;">교육생을 선택하세요</div>
        <div style="font-size:13px; margin-top:8px;">위 드롭다운에서 교육생을 선택하면 리포트가 표시됩니다.</div>
      </div>`;
    return;
  }

  // 로딩 표시
  document.getElementById('reportPage').innerHTML = `
    <div class="report-loading" id="reportLoading">
      <div class="spinner"></div>
      <div style="font-size:16px; font-weight:700;">리포트를 불러오는 중...</div>
      <div style="font-size:13px; margin-top:8px;">교육 활동 데이터를 분석하고 있습니다.</div>
    </div>`;

  try {
    // 1. 멤버 정보 조회
    const members = allMembersData.length > 0 ? allMembersData : await fetchAllMembers();
    const member = members.find(m => m.id == memberId);
    if (!member) {
      document.getElementById('reportPage').innerHTML = '<div class="report-loading"><div style="font-size:16px; font-weight:700; color:var(--accent);">교육생 정보를 찾을 수 없습니다.</div></div>';
      return;
    }
    currentMember = member;

    // 2. 활동 로그 조회
    const logs = await fetchMemberLogs(memberId);

    // 3. 세션 & 팀 정보
    const session = getSavedSession();
    if (!teamNamesData || !teamNamesData.A) {
      teamNamesData = await fetchTeamNames();
    }
    const teamName = (teamNamesData && teamNamesData[member.team_id]) || ('팀 ' + member.team_id);
    const trainerName = (teamNamesData && teamNamesData.trainer_name) || '심재우 대표';

    // 4. 점수 계산
    const scores = {
      quiz: member.score_quiz || 0,
      needs: member.score_needs || 0,
      scenario: member.score_scenario || 0,
      practice: member.score_practice || 0,
      roleplay: member.score_roleplay || 0,
      fab: member.score_fab || 0
    };
    const totalScore = Object.values(scores).reduce((a, b) => a + b, 0);
    const totalGrade = getGrade(totalScore, TOTAL_MAX);

    // 5. SPIN 역량 분석 (활동 로그에서 추출)
    const spinCounts = { S: 0, P: 0, I: 0, N: 0 };
    logs.forEach(log => {
      if (log.activity_data && typeof log.activity_data === 'object') {
        const d = log.activity_data;
        if (d.spin_type && spinCounts.hasOwnProperty(d.spin_type)) {
          spinCounts[d.spin_type]++;
        }
        if (d.spinCounts) {
          ['S','P','I','N'].forEach(t => { spinCounts[t] += (d.spinCounts[t] || 0); });
        }
        if (d.spin_distribution) {
          ['S','P','I','N'].forEach(t => { spinCounts[t] += (d.spin_distribution[t] || 0); });
        }
      }
    });
    const spinTotal = spinCounts.S + spinCounts.P + spinCounts.I + spinCounts.N;
    const spinRatios = {};
    ['S','P','I','N'].forEach(t => {
      spinRatios[t] = spinTotal > 0 ? Math.round((spinCounts[t] / spinTotal) * 100) : 0;
    });

    // 6. 상위 % 계산
    const allScores = members.filter(m => m.name).map(m =>
      (m.score_quiz || 0) + (m.score_needs || 0) + (m.score_scenario || 0) +
      (m.score_practice || 0) + (m.score_roleplay || 0) + (m.score_fab || 0)
    ).sort((a, b) => b - a);
    const rank = allScores.indexOf(totalScore) + 1;
    const topPct = allScores.length > 0 ? Math.round((rank / allScores.length) * 100) : 0;

    // 7. 강점/약점 도출
    const catEntries = Object.keys(CAT_MAX).map(cat => ({
      cat, score: scores[cat], max: CAT_MAX[cat], pctVal: pct(scores[cat], CAT_MAX[cat])
    }));
    catEntries.sort((a, b) => b.pctVal - a.pctVal);
    const strengths = catEntries.filter(e => e.pctVal >= 70).slice(0, 3);
    const weaknesses = catEntries.filter(e => e.pctVal < 70).slice(-3).reverse();

    // 8. 이슈 추론
    const memberWithRatios = { ...member };
    const triggered = issueRules.filter(r => r.condition(memberWithRatios, spinRatios));

    // 9. 롤플레이 상세 (로그에서 난이도별)
    const roleplayLogs = logs.filter(l => l.activity_type === 'roleplay' && l.activity_data);
    const roleplayByDiff = { easy: [], medium: [], hard: [] };
    roleplayLogs.forEach(l => {
      const d = l.activity_data;
      const diff = d.difficulty || 'medium';
      if (roleplayByDiff[diff]) roleplayByDiff[diff].push(l);
    });

    // 10. 퀴즈 상세 (로그에서)
    const quizLogs = logs.filter(l => l.activity_type === 'quiz' && l.activity_data);
    let quizCorrect = 0, quizTotal = 0;
    const quizCats = {};
    quizLogs.forEach(l => {
      const d = l.activity_data;
      const cat = d.category || d.quiz_category || '일반';
      if (!quizCats[cat]) quizCats[cat] = { correct: 0, total: 0 };
      quizCats[cat].total++;
      quizTotal++;

      // 사전/사후 모두 있으면 비교 바 차트 (대응 가능한 scale 문항 비교)
      if (surveyPreData && surveyPostData) {
        html += '<div style="font-size:14px; font-weight:800; color:var(--text); margin:24px 0 12px;">사전 vs 사후 점수 변화</div>';
        html += '<table style="width:100%; border-collapse:collapse; margin-bottom:16px;">';
        html += '<thead><tr><th style="text-align:left; padding:8px; font-size:11px; color:var(--text-muted); border-bottom:2px solid var(--border);">문항</th><th style="width:60px; text-align:center; padding:8px; font-size:11px; color:var(--blue); border-bottom:2px solid var(--border);">사전</th><th style="width:60px; text-align:center; padding:8px; font-size:11px; color:var(--green); border-bottom:2px solid var(--border);">사후</th><th style="width:60px; text-align:center; padding:8px; font-size:11px; color:var(--text-muted); border-bottom:2px solid var(--border);">변화</th></tr></thead><tbody>';

        // 대응 비교: pre 1~5 vs post 1~5
        const compareMap = [
          { pre: 'pre_1', post: 'post_1', label: 'SPIN 방법론 이해도' },
          { pre: 'pre_2', post: 'post_2', label: '질문 기법 활용도' },
          { pre: 'pre_3', post: 'post_3', label: '니즈 구분 능력' },
          { pre: 'pre_5', post: 'post_4', label: '시사질문/해결질문 활용' },
          { pre: 'pre_4', post: 'post_5', label: '콜플랜 작성/활용' }
        ];

        compareMap.forEach(cm => {
          const preVal = parseFloat(surveyPreData[cm.pre]);
          const postVal = parseFloat(surveyPostData[cm.post]);
          const pre = !isNaN(preVal) ? preVal : '-';
          const post = !isNaN(postVal) ? postVal : '-';
          let diff = '';
          let diffColor = 'var(--text-muted)';
          if (pre !== '-' && post !== '-') {
            const d = (post - pre).toFixed(1);
            diff = d > 0 ? '+' + d : d;
            diffColor = d > 0 ? 'var(--green)' : d < 0 ? 'var(--accent)' : 'var(--text-muted)';
          }
          html += `<tr>
            <td style="padding:8px; font-size:12px; border-bottom:1px solid var(--border-light);">${cm.label}</td>
            <td style="text-align:center; padding:8px; font-weight:700; color:var(--blue); border-bottom:1px solid var(--border-light);">${pre}</td>
            <td style="text-align:center; padding:8px; font-weight:700; color:var(--green); border-bottom:1px solid var(--border-light);">${post}</td>
            <td style="text-align:center; padding:8px; font-weight:800; color:${diffColor}; border-bottom:1px solid var(--border-light);">${diff}</td>
          </tr>`;
        });

        html += '</tbody></table>';
      }

      // Text 문항 비교
      const preTextQs = surveyPreQuestions.filter(q => q.type === 'text');
      const postTextQs = surveyPostQuestions.filter(q => q.type === 'text');

      if ((surveyPreData && preTextQs.length > 0) || (surveyPostData && postTextQs.length > 0)) {
        html += '<div style="font-size:14px; font-weight:800; color:var(--text); margin:20px 0 12px;">서술형 답변</div>';

        if (surveyPreData) {
          html += '<div style="font-size:12px; font-weight:700; color:var(--blue); margin-bottom:6px;">사전 설문</div>';
          preTextQs.forEach(q => {
            const val = surveyPreData[q.id];
            html += `<div style="margin-bottom:8px; padding:10px 14px; background:rgba(36,113,163,0.04); border-left:3px solid var(--blue); border-radius:0 8px 8px 0;">
              <div style="font-size:11px; font-weight:700; color:var(--text-muted); margin-bottom:4px;">${q.text}</div>
              <div style="font-size:13px; color:var(--text-secondary); line-height:1.6;">${val && val.trim() ? val.trim() : '<span style="color:var(--text-disabled);">미응답</span>'}</div>
            </div>`;
          });
        }

        if (surveyPostData) {
          html += '<div style="font-size:12px; font-weight:700; color:var(--green); margin:12px 0 6px;">사후 설문</div>';
          postTextQs.forEach(q => {
            const val = surveyPostData[q.id];
            html += `<div style="margin-bottom:8px; padding:10px 14px; background:rgba(30,132,73,0.04); border-left:3px solid var(--green); border-radius:0 8px 8px 0;">
              <div style="font-size:11px; font-weight:700; color:var(--text-muted); margin-bottom:4px;">${q.text}</div>
              <div style="font-size:13px; color:var(--text-secondary); line-height:1.6;">${val && val.trim() ? val.trim() : '<span style="color:var(--text-disabled);">미응답</span>'}</div>
            </div>`;
          });
        }
      }
    }

    html += '</div>'; // /report-section 10

    // --- 리포트 푸터 ---
    html += `
    <div style="text-align:center; padding-top:20px; border-top:1px solid var(--border); font-size:11px; color:var(--text-disabled);">
      본 리포트는 SPIN Selling AI 플랫폼에서 자동 생성되었습니다.<br>
      &copy; 2026 Korn Ferry SPIN Selling Official Program | 심재우 대표 | SB Consulting
    </div>`;

    html += '</div>'; // /report-body

    // 렌더링
    document.getElementById('reportPage').innerHTML = html;

  } catch (err) {
    console.error('Report load error:', err);
    document.getElementById('reportPage').innerHTML = `
      <div class="report-loading">
        <div style="font-size:48px; margin-bottom:16px;">⚠️</div>
        <div style="font-size:16px; font-weight:700; color:var(--accent);">리포트를 불러오는 중 오류가 발생했습니다.</div>
        <div style="font-size:13px; margin-top:8px; color:var(--text-muted);">${err.message}</div>
      </div>`;
  }
}

// ========== 이메일 발송 ==========
async function sendReportEmail() {
  if (!currentMember) {
    alert('먼저 교육생을 선택하세요.');
    return;
  }

  const btn = event.target;
  const origText = btn.textContent;
  btn.textContent = '📧 발송 중...';
  btn.disabled = true;

  try {
    const reportPage = document.getElementById('reportPage');
    const fullHtml = buildEmailHtml(reportPage.innerHTML);

    const res = await fetch(`${SUPABASE_URL}/functions/v1/dynamic-function`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SUPABASE_KEY}`
      },
      body: JSON.stringify({
        to: currentMember.email || '',
        name: currentMember.name,
        reportHtml: fullHtml
      })
    });

    const data = await res.json();

    if (data.id || data.success) {
      alert(`이메일 발송 완료!\n\n수신: ${currentMember.email || '(이메일 미등록)'}\n교육생: ${currentMember.name}\n\n리포트 전체가 이메일로 전송되었습니다.`);
    } else {
      alert(`발송 실패: ${JSON.stringify(data)}`);
    }
  } catch (e) {
    alert(`발송 오류: ${e.message}`);
  }

  btn.textContent = origText;
  btn.disabled = false;
}
