<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPIN Selling - 교육 통계</title>
<link rel="stylesheet" href="common.css">
<style>
.stats-container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

.stats-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
.stats-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 24px; text-align: center; }
.stats-card-icon { font-size: 28px; margin-bottom: 8px; }
.stats-card-value { font-size: 32px; font-weight: 900; color: var(--accent2); }
.stats-card-label { font-size: 13px; color: var(--text-muted); font-weight: 600; margin-top: 4px; }

.chart-section { background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 20px; }
.chart-title { font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 16px; }

.bar-chart { display: flex; flex-direction: column; gap: 10px; }
.bar-row { display: flex; align-items: center; gap: 12px; }
.bar-label { width: 100px; font-size: 13px; font-weight: 600; color: var(--text); text-align: right; flex-shrink: 0; }
.bar-track { flex: 1; height: 28px; background: var(--bg); border-radius: 8px; overflow: hidden; position: relative; }
.bar-fill { height: 100%; border-radius: 8px; display: flex; align-items: center; padding-left: 10px; font-size: 12px; font-weight: 700; color: white; transition: width 0.6s ease; }
.bar-value { width: 50px; font-size: 13px; font-weight: 700; color: var(--text); text-align: right; flex-shrink: 0; }

.spin-radar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.spin-stat { text-align: center; padding: 20px; background: var(--bg); border-radius: 12px; }
.spin-stat-type { font-size: 24px; font-weight: 900; margin-bottom: 4px; }
.spin-stat-type.type-S { color: #2980b9; }
.spin-stat-type.type-P { color: #d68910; }
.spin-stat-type.type-I { color: #c0392b; }
.spin-stat-type.type-N { color: #1e8449; }
.spin-stat-value { font-size: 20px; font-weight: 800; color: var(--text); }
.spin-stat-label { font-size: 11px; color: var(--text-muted); }

.session-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.session-table th { padding: 10px 12px; text-align: left; font-size: 12px; font-weight: 700; color: var(--text-muted); border-bottom: 2px solid var(--border); text-transform: uppercase; letter-spacing: 0.5px; }
.session-table td { padding: 10px 12px; border-bottom: 1px solid var(--border-light); }
.session-table tr:hover td { background: var(--bg); }

@media (max-width: 768px) {
  .stats-summary { grid-template-columns: repeat(2, 1fr); }
  .spin-radar { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="auth-overlay hidden" id="authLogin"></div>
<div class="auth-overlay hidden" id="authSignup"></div>
<div id="mainApp" style="display:none;">
<div class="header">
  <div class="logo">
    <a href="index.html" style="display:flex;align-items:center;gap:14px;text-decoration:none;">
      <img src="logo-kornferry.png" alt="Korn Ferry" class="logo-img">
      <div>
        <div class="logo-text">SPIN Selling <span style="color:var(--gold-light);">AI</span></div>
        <div class="logo-sub">AI-Powered Training</div>
      </div>
    </a>
  </div>
</div>
<div id="navPlaceholder" data-active=""></div>

<div class="stats-container">
  <div class="card" style="margin-bottom: 24px;">
    <div class="card-title"><span class="icon">📊</span> 교육 통계 대시보드</div>
    <p style="color:var(--text-tertiary); font-size:13px;">전체 교육 이력의 통합 분석 데이터입니다.</p>
  </div>

  <!-- 요약 카드 -->
  <div class="stats-summary">
    <div class="stats-card"><div class="stats-card-icon">🏢</div><div class="stats-card-value" id="totalSessions">0</div><div class="stats-card-label">총 교육 횟수</div></div>
    <div class="stats-card"><div class="stats-card-icon">👥</div><div class="stats-card-value" id="totalMembers">0</div><div class="stats-card-label">총 교육생 수</div></div>
    <div class="stats-card"><div class="stats-card-icon">📝</div><div class="stats-card-value" id="totalActivities">0</div><div class="stats-card-label">총 활동 건수</div></div>
    <div class="stats-card"><div class="stats-card-icon">⭐</div><div class="stats-card-value" id="avgScore">0</div><div class="stats-card-label">평균 총점 (600만점)</div></div>
  </div>

  <!-- 카테고리별 평균 점수 -->
  <div class="chart-section">
    <div class="chart-title">📈 카테고리별 평균 점수</div>
    <div class="bar-chart" id="categoryChart"></div>
  </div>

  <!-- SPIN 역량 분석 (롤플레이 기반) -->
  <div class="chart-section">
    <div class="chart-title">🎯 SPIN 질문 유형 평균 비율</div>
    <p style="font-size:12px; color:var(--text-muted); margin-bottom:16px;">롤플레이/질문연습 데이터 기반 집계</p>
    <div class="spin-radar" id="spinRadar"></div>
  </div>

  <!-- 교육 이력 테이블 -->
  <div class="chart-section">
    <div class="chart-title">📋 교육 이력</div>
    <table class="session-table">
      <thead>
        <tr><th>회사명</th><th>교육일</th><th>교육생</th><th>평균점수</th><th>상태</th></tr>
      </thead>
      <tbody id="sessionTableBody"></tbody>
    </table>
  </div>
</div>

<div id="footerPlaceholder"></div>
</div>

<script src="common.js"></script>
<script>
const CAT_MAX = { quiz: 80, needs: 80, scenario: 100, practice: 120, roleplay: 100, fab: 90 };
const CAT_LABELS = { quiz: '퀴즈', needs: '니즈분석', scenario: '질문구분', practice: '질문연습', roleplay: '롤플레이', fab: 'FAB/BAF' };
const CAT_COLORS = { quiz: '#2563eb', needs: '#16a34a', scenario: '#d97706', practice: '#7c3aed', roleplay: '#dc2626', fab: '#0891b2' };

async function loadStats() {
  const sessions = await fetchSessions();
  let allMembers = [];
  let totalActivities = 0;

  const sessionData = await Promise.all(sessions.map(async s => {
    const [members, activities] = await Promise.all([
      fetch(SUPABASE_URL + '/rest/v1/spin_members?session_id=eq.' + s.id + '&name=neq.&select=*', { headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY } }).then(r => r.json()),
      fetch(SUPABASE_URL + '/rest/v1/spin_activities?session_id=eq.' + s.id + '&select=id', { headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY } }).then(r => r.json())
    ]);
    const registered = members.filter(m => m.name && m.name.trim());
    allMembers.push(...registered);
    totalActivities += (Array.isArray(activities) ? activities.length : 0);

    const avgTotal = registered.length > 0 ? Math.round(registered.reduce((sum, m) => sum + (m.score_quiz||0) + (m.score_needs||0) + (m.score_scenario||0) + (m.score_practice||0) + (m.score_roleplay||0) + (m.score_fab||0), 0) / registered.length) : 0;
    return { ...s, members: registered, avgTotal, actCount: Array.isArray(activities) ? activities.length : 0 };
  }));

  // 요약 카드
  document.getElementById('totalSessions').textContent = sessions.length;
  document.getElementById('totalMembers').textContent = allMembers.length;
  document.getElementById('totalActivities').textContent = totalActivities;
  const overallAvg = allMembers.length > 0 ? Math.round(allMembers.reduce((s, m) => s + (m.score_quiz||0) + (m.score_needs||0) + (m.score_scenario||0) + (m.score_practice||0) + (m.score_roleplay||0) + (m.score_fab||0), 0) / allMembers.length) : 0;
  document.getElementById('avgScore').textContent = overallAvg;

  // 카테고리별 평균
  const catChart = document.getElementById('categoryChart');
  const cats = ['quiz','needs','scenario','practice','roleplay','fab'];
  catChart.innerHTML = cats.map(cat => {
    const avg = allMembers.length > 0 ? Math.round(allMembers.reduce((s,m) => s + (m['score_'+cat]||0), 0) / allMembers.length) : 0;
    const pct = Math.round(avg / CAT_MAX[cat] * 100);
    return '<div class="bar-row"><div class="bar-label">' + CAT_LABELS[cat] + '</div><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + CAT_COLORS[cat] + ';">' + avg + '</div></div><div class="bar-value">/' + CAT_MAX[cat] + '</div></div>';
  }).join('');

  // SPIN 비율 (간이 — 점수 기반 추정)
  const spinRadar = document.getElementById('spinRadar');
  const sAvg = allMembers.length > 0 ? Math.round(allMembers.reduce((s,m) => s + (m.score_quiz||0), 0) / allMembers.length) : 0;
  const pAvg = allMembers.length > 0 ? Math.round(allMembers.reduce((s,m) => s + (m.score_needs||0), 0) / allMembers.length) : 0;
  const iAvg = allMembers.length > 0 ? Math.round(allMembers.reduce((s,m) => s + (m.score_practice||0), 0) / allMembers.length) : 0;
  const nAvg = allMembers.length > 0 ? Math.round(allMembers.reduce((s,m) => s + (m.score_roleplay||0), 0) / allMembers.length) : 0;
  const spinTotal = sAvg + pAvg + iAvg + nAvg || 1;
  spinRadar.innerHTML = [
    {t:'S',label:'상황질문',v:sAvg,c:'type-S'},
    {t:'P',label:'문제질문',v:pAvg,c:'type-P'},
    {t:'I',label:'시사질문',v:iAvg,c:'type-I'},
    {t:'N',label:'해결질문',v:nAvg,c:'type-N'}
  ].map(s => '<div class="spin-stat"><div class="spin-stat-type ' + s.c + '">' + s.t + '</div><div class="spin-stat-value">' + Math.round(s.v/spinTotal*100) + '%</div><div class="spin-stat-label">' + s.label + ' (평균 ' + s.v + '점)</div></div>').join('');

  // 교육 이력 테이블
  const tbody = document.getElementById('sessionTableBody');
  tbody.innerHTML = sessionData.map(s => {
    const status = s.team_names && s.team_names.ended ? '<span style="color:var(--green);font-weight:700;">완료</span>' : s.avgTotal > 0 ? '<span style="color:var(--blue);font-weight:700;">진행중</span>' : '<span style="color:var(--purple);font-weight:700;">예정</span>';
    return '<tr><td style="font-weight:700;">' + (s.company_name||'-') + '</td><td>' + (s.training_date||'-') + '</td><td>' + s.members.length + '명</td><td>' + s.avgTotal + '/600</td><td>' + status + '</td></tr>';
  }).join('');
}

document.addEventListener('DOMContentLoaded', () => setTimeout(loadStats, 200));
</script>
</body>
</html>
