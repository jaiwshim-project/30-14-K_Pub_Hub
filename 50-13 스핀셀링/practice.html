<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPIN Selling 2.0 - 질문 연습</title>
<link rel="stylesheet" href="common.css">
</head>
<body>

<div class="auth-overlay hidden" id="authLogin"></div>
<div class="auth-overlay hidden" id="authSignup"></div>

<div id="mainApp" style="display:none;">

<div class="header">
  <div class="logo">
    <a href="index.html" style="display:flex;align-items:center;gap:14px;text-decoration:none;">
      <img src="logo-huthwaite.svg" alt="Huthwaite" class="logo-img">
      <div>
        <div class="logo-text">SPIN Selling 2.0</div>
        <div class="logo-sub">AI-Powered Training</div>
      </div>
    </a>
  </div>
  <div class="header-right">
    <div class="team-badge" id="headerTeam"></div>
    <div class="score-display" id="headerScore">0 점</div>
  </div>
</div>

<div id="navPlaceholder" data-active="practice"></div>

<div class="main">
<div class="section">
  <div class="card">
    <div class="card-title"><span class="icon">💬</span> SPIN 질문 작성 연습</div>

    <div class="practice-context" id="practiceContext">
      <strong>상황:</strong> 당신은 기업용 솔루션 영업사원입니다.
      고객사(중견 제조업체)의 생산관리 담당 이사를 만났습니다.
      고객은 현재 수작업으로 생산 스케줄을 관리하고 있으며,
      최근 납기 지연 문제가 발생하고 있다고 합니다.
    </div>

    <div style="margin-bottom: 16px;">
      <button class="btn btn-sm btn-secondary" onclick="changePracticeContext(0)">제조업 시나리오</button>
      <button class="btn btn-sm btn-secondary" onclick="changePracticeContext(1)">IT 서비스 시나리오</button>
      <button class="btn btn-sm btn-secondary" onclick="changePracticeContext(2)">금융 시나리오</button>
      <button class="btn btn-sm btn-secondary" onclick="changePracticeContext(3)">병원 시나리오</button>
    </div>

    <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 12px;">질문 유형을 선택한 후, 해당 유형의 질문을 작성하세요:</p>

    <div class="spin-type-selector">
      <button class="spin-type-btn S active" onclick="selectSpinType('S')">
        <span class="type-name">S</span>
        <span class="type-desc">상황질문</span>
      </button>
      <button class="spin-type-btn P" onclick="selectSpinType('P')">
        <span class="type-name">P</span>
        <span class="type-desc">문제질문</span>
      </button>
      <button class="spin-type-btn I" onclick="selectSpinType('I')">
        <span class="type-name">I</span>
        <span class="type-desc">시사질문</span>
      </button>
      <button class="spin-type-btn N" onclick="selectSpinType('N')">
        <span class="type-name">N</span>
        <span class="type-desc">해결질문</span>
      </button>
    </div>

    <textarea class="practice-input" id="practiceInput" placeholder="질문을 작성하세요..."></textarea>

    <div style="margin-top: 12px; display: flex; gap: 8px;">
      <button class="btn btn-primary" onclick="submitPracticeQuestion()">제출 & AI 평가</button>
      <button class="btn btn-secondary" onclick="showExampleQuestions()">예시 질문 보기</button>
    </div>

    <div class="ai-feedback" id="practiceFeedback" style="display:none;"></div>

    <div id="practiceHistory" style="margin-top: 20px;"></div>
  </div>
</div>
</div>

<div id="flowNavPlaceholder"></div>
<div id="footerPlaceholder"></div>
</div>

<script src="common.js"></script>
<script src="practice.js"></script>
</body>
</html>
