<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPIN Selling 2.0 & 3.0 - 팀 편성</title>
<link rel="stylesheet" href="common.css">
<style>
.ts-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 14px;
  margin-bottom: 32px;
}

.ts-team-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

.ts-team-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
}

.ts-team-card.team-A::before { background: var(--accent); }
.ts-team-card.team-B::before { background: var(--blue); }
.ts-team-card.team-C::before { background: var(--green); }
.ts-team-card.team-D::before { background: var(--gold); }
.ts-team-card.team-E::before { background: var(--purple); }

.ts-team-name {
  font-size: 15px;
  font-weight: 800;
  margin-bottom: 4px;
  color: var(--text);
}

.ts-team-count {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 14px;
}

.ts-member-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 2px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.ts-member-input {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: inherit;
  font-size: 14px;
  color: var(--text);
  margin-bottom: 8px;
  transition: border-color 0.2s;
}

.ts-member-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(192,57,43,0.06);
  background: #fff;
}

.ts-member-input::placeholder { color: var(--text-disabled); }

.ts-member-input.filled {
  border-color: var(--green);
  background: rgba(30,132,73,0.03);
}

.ts-summary {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-top: 20px;
}

.ts-stat {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 20px;
  text-align: center;
  flex: 1;
  min-width: 120px;
}

.ts-stat-value {
  font-size: 28px;
  font-weight: 900;
  color: var(--accent);
}

.ts-stat-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

@media (max-width: 768px) {
  .ts-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 480px) {
  .ts-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="auth-overlay hidden" id="authLogin"></div>
<div class="auth-overlay hidden" id="authSignup"></div>

<div id="mainApp" style="display:none;">

<div class="header">
  <div class="logo">
    <a href="index.html" style="display:flex;align-items:center;gap:14px;text-decoration:none;">
      <img src="logo-kornferry.svg" alt="Korn Ferry" class="logo-img">
      <div>
        <div class="logo-text">SPIN Selling 2.0 & 3.0</div>
        <div class="logo-sub">AI-Powered Training</div>
      </div>
    </a>
  </div>
  <div class="header-right">
    <div class="team-badge" id="headerTeam"></div>
    <div class="score-display" id="headerScore">0 점</div>
  </div>
</div>

<div id="navPlaceholder" data-active="team-setup"></div>

<div class="main">
<div class="section">

  <div class="card">
    <div class="card-title"><span class="icon">👥</span> 팀 편성 & 이름 등록</div>
    <p style="color: var(--text-tertiary); margin-bottom: 8px; font-size: 14px; line-height: 1.6;">
      5팀(팀당 4명, 총 20명)으로 구성합니다. 각 팀원의 이름을 입력하세요.<br>
      입력하면 자동 저장되며, 모든 활동의 점수가 이 팀원 기준으로 집계됩니다.
    </p>

    <div class="ts-summary" id="tsSummary">
      <div class="ts-stat">
        <div class="ts-stat-value" id="tsRegistered">0</div>
        <div class="ts-stat-label">등록 완료</div>
      </div>
      <div class="ts-stat">
        <div class="ts-stat-value" id="tsRemaining" style="color:var(--gold);">20</div>
        <div class="ts-stat-label">미등록</div>
      </div>
      <div class="ts-stat">
        <div class="ts-stat-value" id="tsTeamCount" style="color:var(--blue);">5</div>
        <div class="ts-stat-label">팀 수</div>
      </div>
      <div class="ts-stat" style="cursor:pointer; transition:all 0.2s;" onclick="copyAllCodes()" title="클릭하면 전체 코드 복사">
        <div class="ts-stat-value" style="color:var(--green); font-size:20px;">📋 복사</div>
        <div class="ts-stat-label">접속 코드 일괄 복사</div>
      </div>
    </div>
  </div>

  <div class="ts-grid" id="tsGrid"></div>

  <div style="text-align:center;">
    <a href="quiz.html" class="btn btn-primary" style="font-size:15px; padding:14px 36px;">
      팀 편성 완료 — 교육 시작하기
    </a>
  </div>

</div>
</div>

<div id="flowNavPlaceholder"></div>
<div id="footerPlaceholder"></div>
</div>

<script src="common.js"></script>
<script>
const TEAMS = ['A', 'B', 'C', 'D', 'E'];

async function renderTeamSetup() {
  const members = await fetchAllMembers();
  const container = document.getElementById('tsGrid');

  const grouped = {};
  TEAMS.forEach(t => { grouped[t] = []; });
  members.forEach(m => { if (grouped[m.team_id]) grouped[m.team_id].push(m); });

  const teamNames = await fetchTeamNames();

  container.innerHTML = TEAMS.map(t => {
    const teamMembers = grouped[t];
    const filledCount = teamMembers.filter(m => m.name).length;
    const tName = teamNames[t] || `팀 ${t}`;

    const inputs = teamMembers.map((m, i) => {
      const code = getMemberCode(m.id);
      return `
      <div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div class="ts-member-label">팀원 ${i + 1}</div>
          <div style="font-size:11px; font-weight:700; font-family:monospace; color:${m.name ? 'var(--accent)' : 'var(--text-disabled)'}; letter-spacing:2px;" title="접속 코드">${m.name ? code : '----'}</div>
        </div>
        <input class="ts-member-input ${m.name ? 'filled' : ''}" type="text"
          value="${m.name || ''}"
          placeholder="이름 입력"
          data-id="${m.id}"
          onchange="handleTsName(${m.id}, this.value, this)"
          onfocus="this.select()">
      </div>
    `;}).join('');

    return `
      <div class="ts-team-card team-${t}">
        <input class="ts-member-input" type="text"
          value="${tName}"
          placeholder="팀명 입력"
          style="font-size:15px; font-weight:800; border:1px dashed var(--border); text-align:center; margin-bottom:4px;"
          onchange="handleTeamName('${t}', this.value)">
        <div class="ts-team-count">${filledCount}/4명 등록</div>
        ${inputs}
      </div>
    `;
  }).join('');

  // Update summary
  const registered = members.filter(m => m.name).length;
  document.getElementById('tsRegistered').textContent = registered;
  document.getElementById('tsRemaining').textContent = 20 - registered;
}

async function handleTsName(id, name, inputEl) {
  const trimmed = name.trim();
  await fetch(`${SUPABASE_URL}/rest/v1/spin_members?id=eq.${id}`, {
    method: 'PATCH',
    headers: SB_HEADERS,
    body: JSON.stringify({ name: trimmed, updated_at: new Date().toISOString() })
  });

  inputEl.classList.toggle('filled', !!trimmed);

  // Update count
  const members = await fetchAllMembers();
  const registered = members.filter(m => m.name).length;
  document.getElementById('tsRegistered').textContent = registered;
  document.getElementById('tsRemaining').textContent = 20 - registered;

  // Update team count
  const card = inputEl.closest('.ts-team-card');
  const teamKey = card.className.match(/team-([A-E])/)[1];
  const teamMembers = members.filter(m => m.team_id === teamKey);
  const filledCount = teamMembers.filter(m => m.name).length;
  card.querySelector('.ts-team-count').textContent = `${filledCount}/4명 등록`;
}

async function handleTeamName(teamKey, newName) {
  await updateTeamName(teamKey, newName.trim());
}

async function copyAllCodes() {
  const members = await fetchAllMembers();
  const teamNames = await fetchTeamNames();
  const registered = members.filter(m => m.name);

  if (registered.length === 0) {
    alert('등록된 팀원이 없습니다. 먼저 이름을 입력하세요.');
    return;
  }

  const grouped = {};
  ['A','B','C','D','E'].forEach(t => { grouped[t] = []; });
  registered.forEach(m => { if (grouped[m.team_id]) grouped[m.team_id].push(m); });

  let text = '[ SPIN Selling 2.0 & 3.0 - 개인 접속 코드 ]\n\n';
  ['A','B','C','D','E'].forEach(t => {
    if (grouped[t].length === 0) return;
    const tName = teamNames[t] || `팀 ${t}`;
    text += `■ ${tName}\n`;
    grouped[t].forEach(m => {
      text += `  ${m.name} → ${getMemberCode(m.id)}\n`;
    });
    text += '\n';
  });
  text += '※ 각 페이지 상단에서 본인 코드를 입력하면 자동 로그인됩니다.';

  try {
    await navigator.clipboard.writeText(text);
    alert('접속 코드가 클립보드에 복사되었습니다!\n참가자에게 공유하세요.');
  } catch (e) {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('접속 코드가 클립보드에 복사되었습니다!');
  }
}

document.addEventListener('DOMContentLoaded', function() {
  setTimeout(() => renderTeamSetup(), 100);
});
</script>
</body>
</html>
